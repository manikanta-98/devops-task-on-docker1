name: CI Docker Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2️⃣ Login to Docker Hub
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 3️⃣ Set version (short commit id)
    - name: Set Version
      id: vars
      run: echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    # 4️⃣ Build Docker Image (latest + version)
    - name: Build Docker Image
      run: |
        docker build -t ardhammanikanta/devops-tasks-backend:latest .
        docker build -t ardhammanikanta/devops-tasks-backend:${VERSION} .

    # 5️⃣ Push both images
    - name: Push Docker Images
      run: |
        docker push ardhammanikanta/devops-tasks-backend:latest
        docker push ardhammanikanta/devops-tasks-backend:${VERSION}
