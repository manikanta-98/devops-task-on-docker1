name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Get your code from GitHub
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Install Node.js
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: npm install

    # 4️⃣ Run your backend (optional test)
    - name: Run app
      run: node backend.js & sleep 5

    # 5️⃣ Build Docker Image
    - name: Build Docker Image
      run: docker build -t myapp .

    # 6️⃣ Run Docker Container
    - name: Run Docker Container
      run: docker run -d -p 3000:3000 myapp
